name: Daily Trading Screen

on:
  # Post-market: Mon–Fri at 21:30 UTC = 4:30pm ET (30 min after close)
  schedule:
    - cron: '30 21 * * 1-5'

  # Manual trigger with options
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full          # Screen + market review
          - screen-only   # Watchlist screen only
          - market-only   # Market regime review only
      force_run:
        description: 'Force run (skip trading day check)'
        required: false
        default: false
        type: boolean

concurrency:
  group: daily-screen
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create working directories
        run: mkdir -p data logs reports

      - name: Deploy custom strategy
        run: |
          mkdir -p strategies
          cat > strategies/momentum_breakout.yaml << 'YAML'
name: momentum_breakout
display_name: Momentum Breakout (US)
description: US momentum breakout scanner following Kullamägi/Minervini/META methodology.
category: trend
core_rules: [1, 2, 3, 4, 5]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [momentum_breakout, base_breakout, vcp, tight_base]
default_priority: 10
market_regimes: [trending_up]

instructions: |
  **Momentum Breakout Strategy (Kullamägi / Minervini / META)**

  US equity momentum strategy. All prices in USD.
  Only flag BUY when general market is in confirmed uptrend (QQQ 10-day MA > 20-day MA, price > 50-day MA).

  ## Setup Type A: Tight Base Breakout (Primary)
  - Prior move: 30-100%+ within last 1-3 months required.
  - Base: 2-8 weeks consolidation, volume CONTRACTING, range TIGHTENING.
  - MAs: 10-day and 20-day both rising ~45 degrees. MA10 > MA20 > MA50 ideal.
  - Breakout: price clears base high on volume 1.5x+ average (2x+ ideal).
  - Entry: at or within 1-2% of breakout pivot. Never chase >3% extended.
  - Stop: LOW OF THE BREAKOUT DAY. Never MA20.

  ## Setup Type B: Pullback to Rising MA (Secondary)
  - Stock already in Stage 2 uptrend (higher highs/lows series).
  - 10-day and 20-day MAs rising and spread apart.
  - Price pulls back to 10-day or 20-day MA on LOW volume (no distribution).
  - Entry: first day price holds/bounces at MA.
  - Stop: below low of the pullback day.

  ## HARD RISK RULES (always include in every output)
  - Account risk per trade: 0.5% maximum.
  - Stop: low of breakout/pullback day only. Never widen.
  - Never average down.
  - EARNINGS CHECK REQUIRED: if earnings within 3 trading days → automatic WATCH, do not buy.
  - Never enter more than 2-3% past ideal buy point.

  ## Position Sizing (always calculate — never use generic %)
  Formula: (Account × 0.005) ÷ (Entry Price − Stop Price) = shares
  Show your work: "Entry $X, Stop $Y → risk $Z/share → at 0.5% account risk = N shares"

  ## Scoring
  - Tight base (<8% range) + volume contraction: +15
  - Prior move >50% in 3 months: +10
  - MA10 > MA20 > MA50 all rising: +10
  - Breakout on 2x+ volume: +10
  - Earnings within 3 days: -20, flag as WATCH/NO-TRADE
  - Extended >10% past 20-day MA: -15
  - Volume expanding during base: -15

  ## Disqualifiers → auto WATCH
  - Earnings within 3 trading days
  - Extended >15% above 20-day MA
  - Volume expanding during base (distribution)
  - QQQ in downtrend (10-day below 20-day)
YAML
          echo "✅ Custom strategy deployed"

      - name: Run daily screen
        env:
          # ── LLM ──────────────────────────────────────────────
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_MODEL_FALLBACK: 'gemini-2.0-flash'

          # ── Watchlist ─────────────────────────────────────────
          # Comma-separated US tickers. Update via repo Variables → STOCK_LIST
          STOCK_LIST: ${{ vars.STOCK_LIST || 'VICR,AOSL,AMD,INTC,ARM,AXTI,POWI,CRDO,AEHR,MU,STX,WDC,SNDK,MRAM,MRVL,MXL,LWLG,VIAV,CIEN,AAOI,IREN,DGXX,SLNH,LGN,DELL,CIFR,CRWV,NBIS,WULF,HUT,BE,POWL,LAC,LAR,ALM,NEXA,UAMY,CRML,USAR,RVMD,ALMU,MWH,FCEL,NOK,BB,SATL,BAND,TWLO,BORR,SVM,HYMC' }}
          MARKET_REVIEW_REGION: 'us'

          # ── Report settings ────────────────────────────────────
          REPORT_TYPE: ${{ vars.REPORT_TYPE || 'full' }}
          REPORT_LANGUAGE: 'en'
          SINGLE_STOCK_NOTIFY: 'false'
          MARKET_REVIEW_ENABLED: 'true'
          TRADING_DAY_CHECK_ENABLED: 'true'

          # ── Notion output ──────────────────────────────────────
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_SCREEN_DB_ID }}

          # ── Data sources (yfinance as primary for US stocks) ───
          REALTIME_SOURCE_PRIORITY: 'akshare_sina,efinance,akshare_em'

          # ── Search (for news enrichment) ───────────────────────
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}

          # ── Rate limiting (Gemini free tier: 15 req/min on Flash) ──
          GEMINI_REQUEST_DELAY: '5'     # 5s between LLM calls = 12 req/min, safe under 15
          MAX_WORKERS: '1'              # Serial processing — no parallel rate limit collisions
          ANALYSIS_DELAY: '3'          # 3s gap between stock analysis and market review

          # ── Strategy ──────────────────────────────────────────
          AGENT_SKILLS: 'momentum_breakout'
          AGENT_SKILL_DIR: 'strategies'

          # ── System ────────────────────────────────────────────
          LOG_LEVEL: INFO
          ENABLE_CHIP_DISTRIBUTION: 'false'

        run: |
          FORCE_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_ARG="--force-run"
            echo "⚡ Force run enabled"
          fi

          MODE="${{ github.event.inputs.mode || 'full' }}"
          echo "════════════════════════════════════════"
          echo "🔍 Pucci Daily Trading Screen"
          echo "⏰ Run time (UTC): $(date '+%Y-%m-%d %H:%M:%S')"
          echo "⏰ Market time (ET): $(TZ='America/New_York' date '+%Y-%m-%d %H:%M:%S')"
          echo "📊 Tickers: $(echo $STOCK_LIST | tr ',' '\n' | wc -l) stocks"
          echo "🎯 Mode: $MODE"
          echo "════════════════════════════════════════"

          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_ARG
          elif [ "$MODE" = "screen-only" ]; then
            python main.py --no-market-review $FORCE_ARG
          else
            python main.py $FORCE_ARG
          fi

      - name: Post results to Notion
        if: success()
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_SCREEN_DB_ID: ${{ secrets.NOTION_SCREEN_DB_ID }}
          NOTION_PARENT_DB_ID: ${{ secrets.NOTION_MARKET_BRIEF_DB_ID }}
        run: |
          if [ -f "scripts/notion_push.py" ]; then
            python scripts/notion_push.py
          else
            echo "ℹ️  Notion push script not found, skipping"
          fi

      - name: Upload reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: screen-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 14

      - name: Summary
        if: always()
        run: |
          echo "════════════════════════════════════════"
          echo "📊 Screen complete"
          echo "════════════════════════════════════════"
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "Reports generated:"
            ls -lh reports/
          else
            echo "⚠️  No reports found"
          fi
          [ -f logs/*.log ] && tail -20 logs/*.log 2>/dev/null || true
