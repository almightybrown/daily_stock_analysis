# Momentum Breakout Strategy — Kullamägi / Minervini / META Style
# Tight base breakout (2–8 week consolidation) + pullback to rising 10/20-day MA.
# Strict US momentum rules. Risk: 0.5% account per trade, stop = low of breakout day.

name: momentum_breakout
display_name: Momentum Breakout (US)
description: |
  US momentum breakout scanner following Kullamägi/Minervini/META methodology.
  Identifies tight base breakouts and pullbacks to rising 10/20-day MA.
  Strict risk rules: stop at breakout day low, 0.5% account risk max.
